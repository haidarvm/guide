
#user  nobody;
worker_processes  4;
#worker_cpu_affinity     auto;          # pin tiap worker ke core
worker_rlimit_nofile    65536;
worker_cpu_affinity     0001 0010 0100 1000;
#worker_rlimit_nofile    32768;
worker_priority         -5;


# This default error log path is compiled-in to make sure configuration parsing
# errors are logged somewhere, especially during unattended boot when stderr
# isn't normally logged anywhere. This path will be touched on every nginx
# start regardless of error log location configured here. See
# https://trac.nginx.org/nginx/ticket/147 for more info. 
#
#error_log  /var/log/nginx/error.log;
#

#pid        logs/nginx.pid;


events {
    worker_connections  8192; #1024
    use			kqueue;
    multi_accept	on;
    accept_mutex	off;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        	on;
    tcp_nopush     	on;
    #keepalive_timeout  0;
    keepalive_timeout  30;
    keepalive_requests 5000;
    open_file_cache          max=50000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    aio                 threads;       # async I/O via thread pool
    directio            512;           # bypass page cache untuk file besar

    gzip                on;
    gzip_comp_level     2;             # level 2 = rasio terbaik vs CPU cost
    gzip_min_length     1000;
    gzip_buffers	16 8k;
    gzip_proxied	any;
    gzip_types          text/plain text/css application/json
                        application/javascript text/xml
                        application/xml text/javascript;
    gzip_static         on;            # serve .gz pre-compressed langsung

    # Buffer tuning 4GB
    client_body_buffer_size     128k;
    client_max_body_size        20m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;
    output_buffers              2 256k;
    postpone_output             1460;

    #fastcgi

    fastcgi_cache_path  /var/cache/nginx/fastcgi
                        levels=1:2
                        keys_zone=PHPCACHE:32m
                        max_size=512m
                        inactive=30m
                        use_temp_path=off;

    fastcgi_cache_key   "$scheme$request_method$host$request_uri";

    # Timeout
    fastcgi_connect_timeout  10s;
    fastcgi_send_timeout     30s;
    fastcgi_read_timeout     30s;

    add_header X-FastCGI-Cache $upstream_cache_status;

    server {
        listen       80;
        server_name  localhost;

        #access_log  logs/host.access.log  main;

        location / {
            root   /usr/local/www/nginx;
            index  index.html index.htm;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/local/www/nginx-dist;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
    #
    #server {
    #    listen       8000;
    #    listen       somename:8080;
    #    server_name  somename  alias  another.alias;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}


    # HTTPS server
    #
    #server {
    #    listen       443 ssl;
    #    server_name  localhost;

    #    ssl_certificate      cert.pem;
    #    ssl_certificate_key  cert.key;

    #    ssl_session_cache    shared:SSL:1m;
    #    ssl_session_timeout  5m;

    #    ssl_ciphers  HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers  on;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}

