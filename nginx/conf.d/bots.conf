# =====================================================
# Bot filtering terpusat - include di http block nginx.conf
# =====================================================

# Map UA string → $is_bot
# 1 = bot yang diizinkan cek lebih lanjut (Google)
# 2 = bot lain yang langsung diblok
# 0 = bukan bot
map $http_user_agent $is_bot {
    default                     0;

    # Google - akan diverifikasi rdns terpisah
    "~*Googlebot"               1;
    "~*Googlebot-Image"         1;
    "~*Googlebot-News"          1;
    "~*Google-InspectionTool"   1;
    "~*GoogleOther"             1;
    "~*AdsBot-Google"           1;

    # Bot lain → blokir langsung
    "~*SemrushBot"              2;
    "~*AhrefsBot"               2;
    "~*MJ12bot"                 2;
    "~*DotBot"                  2;
    "~*BLEXBot"                 2;
    "~*PetalBot"                2;
    "~*YandexBot"               2;
    "~*Bytespider"              2;
    "~*ClaudeBot"               2;
    "~*GPTBot"                  2;
    "~*CCBot"                   2;
    "~*FacebookBot"             2;
    "~*Applebot"                2;
    "~*BingPreview"             2;
    "~*msnbot"                  2;
    "~*Baiduspider"             2;
    "~*PiplBot"                 2;
    "~*ia_archiver"             2;
    "~*wget"                    2;
    "~*curl"                    2;
    "~*python-requests"         2;
    "~*Go-http-client"          2;
    "~*libwww-perl"             2;
    "~*scrapy"                  2;
}

# Map untuk geo block IP kosong (UA spoofing: klaim Googlebot tapi IP bukan Google)
geo $is_googlebot_ip {
    default  0;
    # Range IP Googlebot resmi (update berkala)
    # Cek: https://developers.google.com/search/apis/ipranges/googlebot.json
    66.249.64.0/19   1;
    66.249.80.0/20   1;
    66.249.88.0/21   1;
    66.249.96.0/22   1;
    66.249.100.0/23  1;
    66.249.108.0/22  1;
    66.249.112.0/20  1;
    66.249.128.0/21  1;
    66.249.192.0/19  1;
    64.233.160.0/19  1;
}

# Map: jika klaim Google tapi IP bukan Google → spoofed
map $is_bot $bot_action {
    default 0;   # bukan bot → pass
    1       1;   # Google → perlu cek IP
    2       2;   # bot lain → blok
}
