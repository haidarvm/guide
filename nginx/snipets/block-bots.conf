# Snippet ini di-include di dalam server {} block
# Tapi karena pakai map di http level, cukup 2 baris ini

# Blokir bot non-Google langsung
if ($is_bot = 2) {
    return 403;
}

# Googlebot: lolos hanya jika IP-nya match range Google
# (anti spoofing - klaim Googlebot tapi IP bukan Google)
if ($is_bot = 1) {
    set $check_google "bot_${is_googlebot_ip}";
}
if ($check_google = "bot_0") {
    return 403;
}