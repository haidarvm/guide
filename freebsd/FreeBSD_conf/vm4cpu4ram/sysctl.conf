#
#  This file is read when going to multi-user and its contents piped thru
#  ``sysctl'' to adjust kernel values.  ``man 5 sysctl.conf'' for details.
#

# Uncomment this to prevent users from seeing information about processes that
# ==============================
# Network — disesuaikan RAM 4GB
# ==============================

# Backlog koneksi
kern.ipc.somaxconn=16384
kern.ipc.soacceptqueue=16384

# Socket buffer — jangan terlalu besar di RAM 4GB
kern.ipc.maxsockbuf=8388608          # 8MB max per socket
net.inet.tcp.sendbuf_max=8388608
net.inet.tcp.recvbuf_max=8388608
net.inet.tcp.sendbuf_inc=16384
net.inet.tcp.recvbuf_inc=16384
net.inet.tcp.sendspace=131072        # 128k default send buffer
net.inet.tcp.recvspace=131072        # 128k default recv buffer

# TCP performance
net.inet.tcp.delayed_ack=0
net.inet.tcp.fastopen.server_enable=1   # TCP Fast Open
net.inet.tcp.mssdflt=1460
net.inet.tcp.minmss=536
net.inet.tcp.rfc1323=1              # window scaling
net.inet.tcp.sack.enable=1          # selective ACK
net.inet.tcp.ecn.enable=1           # explicit congestion notification

# TIME_WAIT — penting untuk high connection rate
net.inet.tcp.maxtwsx=32768
net.inet.tcp.fast_finwait2_recycle=1
net.inet.tcp.finwait2_timeout=5000  # 5 detik

# ==============================
# Virtual Memory — penting di VM
# ==============================

# Jangan aggressive swap, RAM hanya 4GB
vm.swappiness=10                    # FreeBSD: swap hanya kalau terpaksa
vm.overcommit=0
kern.ipc.shm_use_phys=1            # lock shared memory di RAM

# ==============================
# File descriptor
# ==============================
kern.maxfiles=100000
kern.maxfilesperproc=65536

# ==============================
# Virtio / QEMU spesifik
# ==============================
# Kalau pakai virtio network
net.inet.tcp.tso=0                  # matikan TSO, kadang bermasalah di virtio
#net.inet.tcp.lro=0                  # matikan LRO di virtio
