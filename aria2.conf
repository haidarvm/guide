# --- Pengaturan Koneksi Maksimal ---
# Jumlah koneksi per server (Max 16)
max-connection-per-server=16
# Memecah satu file menjadi minimal n bagian
split=16
# Ukuran minimum pecahan file (1MB) agar fitur split aktif
min-split-size=1M

# --- Pengaturan Kecepatan & Alokasi ---
# Batas kecepatan (0 = tidak terbatas/unlimited)
max-overall-download-limit=0
max-download-limit=0
# Alokasi file cepat (Sangat efektif di sistem file Btrfs/Ext4 Fedora)
file-allocation=falloc

# --- Optimasi Network & Header ---
# Menggunakan User-Agent Browser agar tidak dibatasi server (Throttling)
user-agent=Mozilla/5.0 (X11; Fedora; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
# Mengaktifkan optimasi TCP
disable-ipv6=false
reuse-uri=true